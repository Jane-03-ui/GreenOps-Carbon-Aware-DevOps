script: |
  cd ~
  cd GreenOps-Carbon-Aware-DevOps || { echo "Project folder not found"; exit 1; }

  echo "Pulling latest code..."
  git pull

  echo "Stopping old app..."
  pkill -f app.py || echo "No old process"

  echo "Starting app..."
  cd demo_app || { echo "demo_app folder missing"; exit 1; }

  nohup python3 app.py > output.log 2>&1 &

  echo "Deployment completed successfully"
