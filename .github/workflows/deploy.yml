name: GreenOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~
            cd GreenOps-Carbon-Aware-DevOps || exit 1
            git pull
            pkill -f "app.py" || true
            sleep 2
            cd demo_app || exit 1
            nohup python3 app.py > output.log 2>&1 &
