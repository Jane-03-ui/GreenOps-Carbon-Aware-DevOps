name: GreenOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            cd GreenOps-Carbon-Aware-DevOps || exit 1

            echo "Pulling latest code..."
            git pull

            echo "Stopping old app..."
            pkill -f app.py || echo "No old process"

            echo "Starting app..."
            cd demo_app || exit 1
            nohup python3 app.py > output.log 2>&1 &

            echo "Deployment completed successfully"
