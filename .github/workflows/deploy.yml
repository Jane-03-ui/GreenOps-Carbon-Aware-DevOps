name: GreenOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        pip install requests

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd /home/ec2-user/GreenOps-Carbon-Aware-DevOps
          git pull
          pkill -f "python3 app.py" || true
          cd demo_app
          nohup python3 app.py > output.log 2>&1 &[201~xxname: GreenOps CI/CD Pipeline

